name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare Pages artifact
        run: |
          rm -rf _site
          mkdir -p _site
          cp -R ieumedu.or.kr/. _site/
          mkdir -p _site/news
          cp news.ieumedu.kr/index.html _site/news/index.html
          cp "_site/이음통합평생교육원.html" "_site/index.html"
          echo "www.ieumedu.kr" > _site/CNAME
          touch _site/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
